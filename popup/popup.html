<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block Domain Free</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2z" fill="url(#grad)" />
            <path d="M9 12l2 2 4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="grad" x1="4" y1="2" x2="20" y2="24" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#a855f7"/>
                <stop offset="100%" stop-color="#6C3CE1"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-text">Block Domain Free</span>
      </div>
      <a class="settings-btn" id="settingsBtn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="2"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="2"/>
        </svg>
      </a>
    </div>

    <!-- Current Site Card -->
    <div class="site-card" id="siteCard">
      <div class="site-info">
        <div class="site-favicon" id="siteFavicon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
            <path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20" stroke="currentColor" stroke-width="2"/>
          </svg>
        </div>
        <div class="site-details">
          <div class="site-hostname" id="siteHostname">Loading…</div>
          <div class="site-status" id="siteStatus">Checking…</div>
        </div>
      </div>
      <div class="toggle-wrap">
        <label class="toggle" id="toggleLabel">
          <input type="checkbox" id="blockToggle" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-value" id="statToday">0</div>
        <div class="stat-label">Blocked today</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-box">
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-label">All time</div>
      </div>
    </div>

    <!-- Quick Add -->
    <div class="quick-add">
      <input
        type="text"
        id="quickAddInput"
        class="quick-input"
        placeholder="Add site to block (e.g. reddit.com)"
      />
      <button class="quick-btn" id="quickAddBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Blocked List Preview -->
    <div class="list-section">
      <div class="list-header">
        <span>Blocked sites</span>
        <span class="list-count" id="listCount">0</span>
      </div>
      <div class="list-items" id="listItems">
        <div class="empty-state">No sites blocked yet</div>
      </div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
