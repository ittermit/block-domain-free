<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Blocked — Block Domain Free</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="blocked.css" />
</head>
<body>
  <!-- Animated background particles -->
  <div class="particles" id="particles"></div>

  <div class="container">
    <!-- Shield icon animated -->
    <div class="shield-wrap">
      <div class="shield-glow"></div>
      <div class="shield-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.35C16.5 22.15 20 17.25 20 12V6L12 2z"
            fill="url(#shieldGrad)" />
          <path d="M9 12l2 2 4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="shieldGrad" x1="4" y1="2" x2="20" y2="24" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#a855f7"/>
              <stop offset="100%" stop-color="#6C3CE1"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
    </div>

    <!-- Main text -->
    <h1 class="title">This site is blocked</h1>
    <p class="subtitle">
      You blocked <span class="domain-badge" id="domainBadge">this site</span> to stay focused.
    </p>

    <!-- Motivational quote -->
    <div class="quote-box" id="quoteBox">
      <span class="quote-icon">"</span>
      <p class="quote-text" id="quoteText">The secret of getting ahead is getting started.</p>
      <span class="quote-author" id="quoteAuthor">— Mark Twain</span>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn-back" id="btnBack">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M19 12H5M5 12l7-7M5 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Go Back
      </button>
      <button class="btn-settings" id="btnSettings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="2"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="2"/>
        </svg>
        Settings
      </button>
    </div>

    <!-- Branding -->
    <div class="branding">
      <span>Protected by</span>
      <strong>Block Domain Free</strong>
    </div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
