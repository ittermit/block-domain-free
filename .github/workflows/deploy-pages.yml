name: Deploy GitHub Pages

on:
  push:
    branches:
      - main        # срабатывает при каждом пуше в main
  workflow_dispatch:  # ручной запуск из вкладки Actions

# Разрешения для публикации на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Только один деплой одновременно
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Checkout кода
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Настройка GitHub Pages
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      # 3. Загрузка папки docs/ как артефакта Pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/          # публикуем содержимое папки docs/

      # 4. Публикация
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
